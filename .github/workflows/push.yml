name: 热榜推送企业微信
on:
  schedule:
    - cron: "0 8,12,18,22 * * *"  # 每天 8/12/18/22 点推送
  workflow_dispatch:  # 允许手动运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install requests
      - run: python push_hot.py
